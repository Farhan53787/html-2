<html>
    <head>
        <style>
         .flex-container{
           display:flex;
           flex-direction:row;
           width:300px;
           background-color:lightcoral;
           padding:30px;
           text-align:center;
           justify-content: space-around;
         }   
         .flex-container div{
            width:300px;
            background-color:rgb(115, 255, 1);
            margin:5px;
            padding:5px;
         }
        </style>
    </head>
    <body>
        <div class="flex-container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
    </body>
</html>
